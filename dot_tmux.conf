# Prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

set -g mouse on  # Enable mouse

# Terminal / color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Focus events (needed for nvim autoread/FocusGained)
set -g focus-events on

# Scrollback
set -g history-limit 50000

# OSC 52 clipboard (works over SSH)
set -g set-clipboard on
set -g allow-passthrough on

# Faster escape (important for neovim)
set -sg escape-time 10

# Window/pane numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vim mode
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Copy mode vi bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-no-clear

# Splits and windows preserve working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane resize with vim keys (repeatable)
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Session management
bind-key f run-shell "sesh connect \"$(sesh list | fzf-tmux -p 55%,60% --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ')\""
bind-key Tab switch-client -l  # Toggle last session
# Pre-kill the pad so the client doesn't land on it as the next session.
bind-key X confirm-before -p "Kill session #S? (y/n)" {
    run-shell "tmux kill-session -t \"scratch-$(printf %s '#{session_id}' | sha256sum | head -c 16)-pad\" 2>/dev/null || true"
    kill-session
}

# Per-session scratch pad, toggled with prefix + backtick. Name hashes
# #{session_id} (not session_name) so the link survives rename; single
# quotes keep the literal $N from being eaten as a shell positional param.
bind ` if-shell -F '#{m:scratch-*-pad,#{session_name}}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 75% \
      -E "tmux new-session -A -s \"scratch-$(printf %s '#{session_id}' | sha256sum | head -c 16)-pad\""
}

# Reap the pad when its parent session closes. #{hook_session} is the
# closing session's id; same hash recipe as the binding above.
set-hook -g session-closed[1] {
    run-shell "tmux kill-session -t \"scratch-$(printf %s '#{hook_session}' | sha256sum | head -c 16)-pad\" 2>/dev/null || true"
}

# Window management
bind-key -r > swap-window -d -t +1  # Move window right
bind-key -r < swap-window -d -t -1  # Move window left

# Pane management
bind-key x kill-pane              # Kill pane without confirm (default asks)
bind-key z resize-pane -Z         # Toggle pane zoom (default, here for clarity)
bind-key m set-option -g mouse \; display-message "Mouse #{?mouse,ON,OFF}"

# Search scrollback
bind-key / copy-mode -e \; send-keys ?  # Enter copy-mode and search up (vim-style)

# Scroll UX (native scrollbars + better copy-mode + mighty-scroll)

# Native pane scrollbars (tmux 3.6+)
set -g pane-scrollbars modal
set -g pane-scrollbars-position right

# Mouse: pass through to alternate-screen apps (TUIs like claude, nvim);
# only enter copy-mode in normal panes
bind -n MouseDrag1Pane if -F "#{alternate_on}" "send -M" "copy-mode -M"
bind -n WheelUpPane   if -F "#{alternate_on}" "send -M" "if -F ‘#{pane_in_mode}’ ‘send -M’ ‘copy-mode -e; send -M’"
bind -n WheelDownPane if -F "#{alternate_on}" "send -M" "send -M"

# Obvious indicator when you’re scrolled back / in copy-mode
set -g pane-border-status top
set -g pane-border-format "#{?pane_in_mode,#[reverse] COPY #[default],}#{?client_readonly,#[fg=red#,reverse] RO #[default] ,}#{?pane_synchronized,#[fg=yellow#,reverse] SYNC #[default] ,} #P #{pane_current_command}"

# Vim-like copy-mode scrolling ergonomics
setw -g mode-keys vi
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi g   send -X history-top
bind -T copy-mode-vi G   send -X history-bottom

# tmux-mighty-scroll
set -g @mighty-scroll-enabled 'on'
set -g @mighty-scroll-speed '1'
set -g @mighty-scroll-interval '1'
# Process-name lists below are space-separated (pscheck splits on whitespace via
# shell word-splitting, matching the plugin's own defaults like 'vim nvim').
# Comma-separated values silently never match.
set -g @mighty-scroll-by-line 'less man more most moor fzf nvim vi vim'
# Forward wheel events to TUIs that handle mouse themselves. Without this,
# mighty-scroll's copy-mode fallback eats the wheel and the app never sees it.
# Matched against /proc/<pid>/comm, so list binary names (e.g. btm not bottom,
# gh-dash for `gh dash`). nvim/vim included because setting this option
# REPLACES the plugin default 'vim nvim'; omitting them regresses nvim scroll.
set -g @mighty-scroll-pass-through 'nvim vim lazygit lazydocker btop btm k9s yazi broot ranger glances gh-dash nvitop'
set -g @mighty-scroll-fallback-mode 'copy-mode'
# Smooth scroll only when not over SSH (re-evaluated on each attach)
set -g update-environment "SSH_CONNECTION SSH_TTY DISPLAY"
set-hook -g client-attached {
  if-shell '[ -n "$SSH_CONNECTION" ]' \
    'set -g @mighty-scroll-smooth off' \
    'set -g @mighty-scroll-smooth on'
}

# Plugins
set -g @plugin 'tmux-plugins/tpm'  # git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Pane/split navigation + resize aware of Neovim splits via @pane-is-vim
# (set by the nvim plugin half on BufEnter, unset on ExitPre). C-hjkl moves
# panes, C-S-Arrow resizes — both forward to nvim when the pane is vim,
# otherwise act on the tmux pane.
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @smart-splits_resize_left_key  'C-S-Left'
set -g @smart-splits_resize_down_key  'C-S-Down'
set -g @smart-splits_resize_up_key    'C-S-Up'
set -g @smart-splits_resize_right_key 'C-S-Right'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# XDG mode: read config from ~/.config/tmux/plugins/tmux-which-key/config.yaml,
# write the compiled init to ~/.local/share/tmux/plugins/tmux-which-key/init.tmux.
# Keeps our chezmoi-managed config out of ~/.tmux/plugins/, where TPM clones
# the plugin and refuses to clone-into a non-empty target.
set -g @tmux-which-key-xdg-enable 1
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'noscript/tmux-mighty-scroll'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'fcsonline/tmux-thumbs'

# Dracula config
set -g @dracula-plugins "time ssh-session attached-clients"
set -g @dracula-show-powerline true
set -g @dracula-show-edge-icons true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g status-position bottom
set -g @dracula-time-format "%m/%d %I:%M %p %Z"
set -g @dracula-clients-singular c
set -g @dracula-clients-plural c

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum
# set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override tmux-yank's MouseDragEnd1Pane (must be after tpm loads)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
