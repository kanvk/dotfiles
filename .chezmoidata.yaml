# Declarative package lists consumed by .chezmoiscripts/run_onchange_before_00-install-packages.sh.tmpl
# Edit this file to add/remove tools; the install script detects content changes via hash.
#
# Schema: tiers, each with optional `inherits`, `include`, and `exclude` blocks.
# The user's `tier` data var (set in ~/.config/chezmoi/chezmoi.toml, prompted at
# init) selects which tier to resolve. Resolution = walk inherits, union all
# `include.<manager>` lists, subtract all `exclude.<manager>` lists. Excludes
# are eager (per-level): a child of a tier that excludes X starts without X.
# See .chezmoitemplates/resolve-tier for the resolver itself.
#
# Conventions:
# - apt: default for everything available there. Fast, integrated, no extra
#   installer needed. Use unless apt's version is far behind upstream or being
#   on the latest matters a lot (e.g. neovim, language toolchains, fast-moving
#   CLI tools). Covers stable tooling (shell, build deps, formatters, libraries).
# - brew: reserved for tools where apt is too out-of-date or being version-current
#   matters. Tap-prefixed entries (e.g. hashicorp/tap/vault) auto-tap on install.
#   Cask entries are prefixed with `cask:` (e.g. `cask:copilot-cli`); the install
#   script rewrites them to `cask "..."` Brewfile lines.
# - uvx: isolated Python applications, installed via `uv tool install`
#   (see install-packages).
# - cargo: Rust-only tools not in apt or brew (or where the cargo build is
#   preferred). Things available via apt/brew live there, not here.
# - npm/go/bun: language-specific globals where there's no apt/brew equivalent.
#
# Tier intent:
# - minimal: shell + git + the few CLI niceties so a fresh box is usable. Picked
#   on disposable / shared / minimal containers.
# - base: minimal + the user's daily-driver tooling. The default for personal
#   machines.
# - full: base + ML/specialty/heavy tools the user only wants on their main box.

tiers:

  # ---- minimal ----------------------------------------------------------------
  minimal:
    inherits: []
    include:
      apt:
        # bootstrap (also satisfies Homebrew install prereqs)
        - age
        - build-essential
        - ca-certificates
        - curl
        - file
        - git
        - gnupg
        - procps
        - wget
        # apt frontend (the install script switches to nala once present)
        - nala
        # core shell / terminal
        - tmux
        - zsh
        - xclip
      brew:
        # editors / multiplexer / prompt
        - neovim
        - sheldon
        - powerlevel10k
        # the test runner + chezmoi itself
        - just
        - chezmoi
        # the few CLI tools that earn "minimal" — used in nearly every shell session
        - bat
        - eza
        - fd
        - fzf
        - moor
        - ripgrep
        - sesh
        - television
        - gh
        - git-delta
        - lazygit
        # python (manager + installer)
        - pyenv
        - uv

  # ---- base -------------------------------------------------------------------
  # Daily-driver dev box. Most personal machines run this tier.
  base:
    inherits: [minimal]
    include:
      apt:
        # build tooling
        - cmake
        - cloc
        - pastel
        - pkg-config
        - shellcheck
        - shfmt
        - tmuxinator
        # python build deps (so `pyenv install <X>` works without errors)
        - libbz2-dev
        - libffi-dev
        - liblzma-dev
        - libncurses-dev
        - libreadline-dev
        - libsqlite3-dev
        - libssl-dev
        - libxml2-dev
        - libxmlsec1-dev
        - python3-tk
        - tk-dev
        - zlib1g-dev
        # media (referenced by nvim/yazi image previews + alias workflows)
        - chafa
        - ffmpeg
        - ffmpegthumbnailer
        # python provider for nvim (apt is the canonical install path; the uvx: list is for apps, installed via uv tool)
        - python3-pynvim
        # GPG: TUI passphrase prompt (avoids "no pinentry" hangs on WSL / headless / SSH sessions)
        - pinentry-curses
        # hex dump CLI; hex.nvim (binary view) shells out to it
        - xxd
      brew:
        # rest of file nav / listing / preview
        - broot
        - glow
        - ripgrep-all
        - tree-sitter-cli
        - yazi
        # yazi preview dependencies: pdf (poppler), svg (resvg), images (imagemagick), archives (sevenzip → 7zz)
        - imagemagick
        - poppler
        - resvg
        - sevenzip
        - zoxide
        # rest of git / VCS
        - difftastic
        - git-absorb     # autofixup: build fixup! commits targeting whoever last touched each hunk
        - git-branchless # smartlog + undo + snapshots; `git sl`, `git undo`, hide/unhide commits
        - git-cliff
        - git-extras
        - git-machete    # stacked-branch / dependency-tree management; `git machete status/traverse`
        - git-revise     # in-memory `rebase -i` replacement; reorder/edit/reword without checkout
        # language toolchains needed BEFORE the per-language install steps
        # (rustup → cargo, go → go install, node → npm -g, npm → bun).
        # bun is NOT here: not in homebrew/core on Linux. Installed via npm
        # globals instead (see npm below).
        - go
        # luajit is the lua interpreter luarocks.nvim's bootstrap shells out
        # to (clones the luarocks source, runs ./configure + make against it)
        # the first time nvim opens on a clean machine. Neovim itself bundles
        # LuaJIT statically, but the bootstrap script needs a `lua`/`luajit`
        # binary on PATH at the time chezmoi-apply hands off to nvim.
        - luajit
        - node
        # node@22 is keg-only; copilot.lua's bundled LSP (`@github/copilot`)
        # has a custom HTTP fetcher whose case-sensitive headers wrapper
        # returns null for `content-type` on Node 26+, breaking signInInitiate
        # and embedding fetches. Pin a parallel Node 22 install and point
        # copilot.lua's `copilot_node_command` at it.
        - node@22
        - rustup
        # Casks: prefix with `cask:`. The install script (Brewfile template)
        # rewrites `cask:foo` → `cask "foo"` and bare entries → `brew "foo"`.
        # Use casks for binaries shipped outside homebrew-core (Copilot CLI,
        # macOS GUI apps, etc.). `just lint` validates the prefix syntax.
        - cask:copilot-cli
        # version / language managers (the daily ones)
        - fnm
        - mise
        # observability / system
        - atuin
        - bottom
        - btop
        - lazydocker
        - procs
        - fastfetch
        # build / quality
        - ast-grep
        - scc
        # secrets / security
        - betterleaks
        # network / sharing
        - curlie
        - magic-wormhole
        - xh
        # misc
        - f2
        - jq
        - ouch
        - sd
        - taplo
        - tlrc
        - vivid
        - yamlfmt
        - yq
      uvx:
        - apprise
        - bandit
        - build
        - bump-my-version
        - glances
        - hatch
        - huggingface-hub
        - jupytext # .ipynb <-> .py(percent) for molten / jupytext.nvim
        - mdformat --with mdformat-frontmatter mdformat-gfm
        - mkdocs
        - nbdime
        - nox
        - nvitop
        - pgcli
        - pip-audit
        - pip-tools
        - prek
        - py-spy
        # nvim python host; the molten extras are required for the
        # :checkhealth molten plugin; pyyaml doubles as the canonical
        # "python with yaml" used by `just lint`.
        - pynvim --with jupyter_client ipykernel cairosvg pnglatex plotly kaleido pyperclip nbformat pillow pyyaml
        - shell-functools
        - tox
        - ydiff
      cargo:
        - cargo-update --features vendored-libgit2  # vendor libgit2 statically — brew libgit2 SONAME bumps (e.g. 1.9→1.10) break dynamically-linked binaries since brew's lib dir isn't on LD_LIBRARY_PATH
        - choose
        - code-minimap
        - coreutils --features unix  # rust uutils — used by alias.zsh `command coreutils <cmd>`; `unix` feature builds the full unix util set
        - du-dust
        - gitoxide
      npm:
        - "@google/gemini-cli"
        - "@mermaid-js/mermaid-cli"
        - "@openai/codex"
        - bun                  # bun isn't in homebrew/core on Linux; npm-global is the simplest portable path
        - neovim               # node provider for nvim plugins
      go:
        - github.com/Gelio/go-global-update    # `uu` alias uses go-global-update for goup
      gh_extensions:
        - dlvhdr/gh-dash

  # ---- full -------------------------------------------------------------------
  # base + ML/specialty/heavy. The user's main box runs this tier.
  full:
    inherits: [base]
    include:
      apt:
        - ranger
      brew:
        # extra prompts / multiplexers
        - starship
        - zellij
        # extra search / grep tools
        - ugrep
        # heavier daily-driver / specialty
        - act
        - ggshield
        - gitleaks
        - jj
        - k9s
        - rustscan
        # data / storage
        - duckdb
        - keydb
        - rclone
        # network / sharing
        - caddy
        - dumbpipe
        # AI / ML
        - llama.cpp
        - ollama
        # python (specialty libs)
        - python-tk@3.12
        # additional language managers
        - asdf
        - ghcup
        - juliaup
        - rbenv
        - ruby
        # `uu`/`uuu` update-sweep prerequisites — invoked directly as binaries,
        # never sourced into the shell. cpanminus provides `cpanm` (perlup).
        # `cpan-outdated` is a CPAN module not a brew formula; install with
        # `cpanm App::cpanoutdated` if you want perlup's outdated-list step
        # to work end-to-end. `stack` (haskellup) is provided by ghcup or
        # apt's haskell-stack, whichever's first on PATH.
        - cpanminus
        # specialty / niche
        - pixi
        - pkl
        - prettier
        - typst
        # taps (full path auto-taps on install)
        - anomalyco/tap/opencode
        - hashicorp/tap/vault
        - localstack/tap/localstack-cli
        - mutagen-io/mutagen/mutagen
      uvx:
        - conda-lock
        - dvc
        - dynaconf
        - gpustack
        - gpustat
        - kaggle
        - markitdown
        - mlflow
        - open-webui
        - openai-whisper
        - poetry
        - pre-commit
        - pysentry-rs
        - python-semantic-release
        - roboflow
        - twine
        - vllm
        - wandb
      cargo:
        - numbat-cli
      bun: []
