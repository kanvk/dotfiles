# Declarative package lists consumed by .chezmoiscripts/run_onchange_before_00-install-packages.sh.tmpl
# Edit this file to add/remove tools; the install script detects content changes via hash.
#
# Schema: tiers, each with optional `inherits`, `include`, and `exclude` blocks.
# The user's `tier` data var (set in ~/.config/chezmoi/chezmoi.toml, prompted at
# init) selects which tier to resolve. Resolution = walk inherits, union all
# `include.<manager>` lists, subtract all `exclude.<manager>` lists. Excludes
# are eager (per-level): a child of a tier that excludes X starts without X.
# See .chezmoitemplates/resolve-tier for the resolver itself.
#
# Conventions:
# - apt: minimal dev-essentials + system-level things brew can't / shouldn't own
#   (shell, tmux, build deps for pyenv-built Python, media for nvim/yazi previews).
# - brew: source of truth for version-current user tooling. Most things go here.
#   Tap-prefixed entries (e.g. hashicorp/tap/vault) auto-tap on install.
# - pipx: isolated Python applications. The YAML key is kept for stability;
#   the install loop uses `uv tool install` under the hood (see install-packages).
# - cargo: Rust-only tools that aren't in brew (or for which the cargo build
#   is preferred). Things available via brew live in `brew`, not here.
# - npm/go/bun: language-specific globals where there's no brew equivalent.
#
# Tier intent:
# - minimal: shell + git + the few CLI niceties so a fresh box is usable. Picked
#   on disposable / shared / minimal containers.
# - base: minimal + the user's daily-driver tooling. The default for personal
#   machines.
# - full: base + ML/specialty/heavy tools the user only wants on their main box.

tiers:

  # ---- minimal ----------------------------------------------------------------
  minimal:
    inherits: []
    include:
      apt:
        # bootstrap (also satisfies Homebrew install prereqs)
        - age
        - build-essential
        - ca-certificates
        - curl
        - file
        - git
        - gnupg
        - procps
        - wget
        # apt frontend (the install script switches to nala once present)
        - nala
        # core shell / terminal
        - tmux
        - zsh
        - xclip
      brew:
        # editors / multiplexer / prompt
        - neovim
        - sheldon
        - powerlevel10k
        # the test runner + chezmoi itself
        - just
        - chezmoi
        # the few CLI tools that earn "minimal" — used in nearly every shell session
        - bat
        - eza
        - fd
        - fzf
        - ripgrep
        - gh
        - git-delta
        - lazygit

  # ---- base -------------------------------------------------------------------
  # Daily-driver dev box. Most personal machines run this tier.
  base:
    inherits: [minimal]
    include:
      apt:
        # build tooling
        - cmake
        - pkg-config
        - shellcheck
        # python build deps (so `pyenv install <X>` works without errors)
        - libbz2-dev
        - libffi-dev
        - liblzma-dev
        - libncurses-dev
        - libreadline-dev
        - libsqlite3-dev
        - libssl-dev
        - libxml2-dev
        - libxmlsec1-dev
        - python3-tk
        - tk-dev
        - zlib1g-dev
        # media (referenced by nvim/yazi image previews + alias workflows)
        - chafa
        - ffmpeg
        - ffmpegthumbnailer
        # CLI utilities referenced in dot_config/zsh/omz-custom/alias.zsh
        - ranger
        - trash-cli
        # python provider for nvim (apt is the canonical install path; the pipx: list is for apps, installed via uv tool)
        - python3-pynvim
        # GPG: TUI passphrase prompt (avoids "no pinentry" hangs on WSL/headless)
        - pinentry-curses
      brew:
        # extra prompts / multiplexers
        - starship
        - zellij
        # rest of file nav / listing / preview
        - broot
        - glow
        - moor
        - ripgrep-all
        - television
        - tree-sitter-cli
        - ugrep
        - yazi
        # rest of git / VCS
        - difftastic
        - git-cliff
        - git-extras
        # language toolchains needed BEFORE the per-language install steps
        # (rustup → cargo, go → go install, node → npm -g, npm → bun).
        # bun is NOT here: not in homebrew/core on Linux. Installed via npm
        # globals instead (see npm below).
        - go
        - node
        - rustup
        # version / language managers (the daily ones)
        - asdf
        - fnm
        - mise
        - pyenv
        # python (apps + tooling)
        - uv
        # observability / system
        - atuin
        - bottom
        - btop
        - lazydocker
        - procs
        - fastfetch
        # build / quality
        - ast-grep
        - cloc
        - scc
        # secrets / security
        - ggshield
        - gitleaks
        # network / sharing
        - curlie
        - xh
        # misc
        - f2
        - ouch
        - pastel
        - sd
        - sesh
        - tlrc
        - tmuxinator
        - vivid
        - yq
      pipx:
        - bandit
        - build
        - bump-my-version
        - dvc
        - dynaconf
        - glances
        - hatch
        - jupytext # .ipynb <-> .py(percent) for molten / jupytext.nvim
        - mkdocs
        - nbdime
        - nox
        - pgcli
        - pip-audit
        - pip-tools
        - poetry
        - pre-commit
        - prek
        - py-spy
        - pynvim # nvim python host (jupyter_client/ipykernel injected separately for molten)
        - python-semantic-release
        - shell-functools
        - tox
        - twine
        - ydiff
      cargo:
        - cargo-update
        - choose
        - code-minimap
        - coreutils --features unix  # rust uutils — used by alias.zsh `command coreutils <cmd>`; `unix` feature builds the full unix util set
        - du-dust
        - gitoxide
      npm:
        - "@mermaid-js/mermaid-cli"
        - "@openai/codex"
        - bun                  # bun isn't in homebrew/core on Linux; npm-global is the simplest portable path
        - neovim               # node provider for nvim plugins
      go:
        - github.com/Gelio/go-global-update    # `uu` alias uses go-global-update for goup
      gh_extensions:
        - dlvhdr/gh-dash

  # ---- full -------------------------------------------------------------------
  # base + ML/specialty/heavy. The user's main box runs this tier.
  full:
    inherits: [base]
    include:
      brew:
        # heavier daily-driver / specialty
        - act
        - betterleaks
        - jj
        - k9s
        - rustscan
        # data / storage
        - duckdb
        - keydb
        - rclone
        # network / sharing
        - caddy
        - dumbpipe
        - magic-wormhole
        # AI / ML
        - llama.cpp
        - ollama
        # python (specialty libs)
        - python-tk@3.12
        # additional language managers
        - ghcup
        - juliaup
        - rbenv
        - ruby
        # `uu`/`uuu` update-sweep prerequisites — invoked directly as binaries,
        # never sourced into the shell. cpanminus provides `cpanm` (perlup).
        # `cpan-outdated` is a CPAN module not a brew formula; install with
        # `cpanm App::cpanoutdated` if you want perlup's outdated-list step
        # to work end-to-end. `stack` (haskellup) is provided by ghcup or
        # apt's haskell-stack, whichever's first on PATH.
        - cpanminus
        # specialty / niche
        - pixi
        - pkl
        - typst
        # taps (full path auto-taps on install)
        - anomalyco/tap/opencode
        - hashicorp/tap/vault
        - localstack/tap/localstack-cli
        - mutagen-io/mutagen/mutagen
      pipx:
        - apprise
        - conda-lock
        - gpustack
        - gpustat
        - huggingface-hub
        - kaggle
        - markitdown
        - mlflow
        - nvitop
        - open-webui
        - openai-whisper
        - pysentry-rs
        - roboflow
        - vllm
        - wandb
      cargo:
        - numbat-cli
      bun: []
