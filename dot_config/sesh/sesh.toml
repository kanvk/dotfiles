#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

# Sesh — smart tmux session manager. https://github.com/joshmedeski/sesh
# Schema autocomplete provided by taplo (brew, base tier).
#
# Public-repo note: every entry in THIS file is visible in git history. Keep
# project-specific names out — push them down into one of the imports below.

strict_mode = true
dir_length = 1

# Hide auto-generated tmux scratch pads (see ~/.tmux.conf) from `sesh list`.
# Anchored regex; user-named scratch-* sessions stay visible.
blacklist = ["^scratch-[0-9a-f]{16}-pad$"]

# Two layers of out-of-band overrides:
#   - sesh.local.toml   — personal-but-portable sessions (encrypted-tracked
#                         under chezmoi when encrypt_locals=true; synced across
#                         the user's own machines).
#   - sesh.machine.toml — machine-only sessions (lab IPs, LAN-only paths, …)
#                         that must never leave the host. Outside the chezmoi
#                         source entirely — create by hand and uncomment the
#                         line below.
# Sesh's TOML importer hard-errors on a missing path (unlike git's silently-
# optional `[include]`), so the machine line stays commented until the file
# exists.
import = [
    "~/.config/sesh/sesh.local.toml",
    # "~/.config/sesh/sesh.machine.toml",
]

# Default preview for `sesh preview <target>` (used by the tv cable's preview
# pane and any other native sesh picker). Replaces sesh's built-in fallback
# of `ls {}` with a colored 2-level tree.
[default_session]
preview_command = "eza --tree --level=2 --color=always --icons {}"

# Run `mkdir -p ~/p/scratch` once; tmux falls back to $HOME if the path is
# missing, so the session works either way.
[[session]]
name = "scratch"
path = "~/p/scratch"
