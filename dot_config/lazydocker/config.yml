# Theme: catppuccin-macchiato (blue accent). Lazydocker exposes fewer
# themable keys than most TUIs (only the four below); the rest falls back
# to lazydocker defaults.
gui:
  border: rounded
  theme:
    activeBorderColor:
      - '#8aadf4'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    selectedLineBgColor:
      - '#363a4f'
    optionsTextColor:
      - '#8aadf4'
