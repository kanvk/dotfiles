# Television channel for sesh session management
# https://github.com/joshmedeski/sesh

[metadata]
name = "sesh"
description = "Session manager integrating tmux sessions, zoxide directories, and config paths"
requirements = ["sesh", "fd"]

[source]
# Multiple source commands for cycling through different modes
# Press Ctrl+S to cycle between sources. The `|| echo ...` placeholders keep
# tv from showing "produced no output on stdout, checking stderr..." when a
# source is conditionally empty (no tmux server / no sesh.toml). The leading
# `-` sits in the icon slot so the `output` transformer below strips it.
command = [
  "sesh list --icons",                                                                # all sessions (default)
  "sesh list -t --icons | grep . || echo '- No tmux sessions running'",               # tmux sessions only
  "sesh list -c --icons | grep . || echo '- No configured sessions (~/.config/sesh/sesh.toml)'",  # config directories
  "sesh list -z --icons",                                                             # zoxide directories
  "fd -H -d 2 -t d -E .Trash . ~"                                                     # find directories
]
ansi = true
output = "{strip_ansi|split: :1..|join: }"

[preview]
command = "sesh preview '{strip_ansi|split: :1..|join: }'"

# Enter is intentionally unbound: tv prints the selection to stdout on
# `confirm_selection` and the `ts` shell function (in
# dot_config/zsh/omz-custom/alias.zsh) pipes it into `sesh connect`. tv 0.15's
# `mode = "execute"` exec-replaces tv with the action command but leaves the
# terminal in a state where tmux's attach renders to nowhere; a shell-level
# wrapper sidesteps that entirely.
[keybindings]
ctrl-d = [ "actions:kill_session", "reload_source" ]

[actions.kill_session]
description = "Kill selected tmux session (press Ctrl+r to reload)"
command = "tmux kill-session -t '{strip_ansi|split: :1..|join: }'"
mode = "fork"
