# [mgr] layer keymap overrides. Prepend semantics: these take priority over
# yazi's default bindings (which still apply for everything not listed here).

# Delete permanently with `d` (yazi default `d` trashes; user prefers no trash).
# Confirmation dialog still fires. `D` keeps its default of `remove --permanently`.
[[mgr.prepend_keymap]]
on   = "d"
run  = "remove --permanently"
desc = "Permanently delete selected files"

# Unbind the default `g d` → ~/Downloads jump.
[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "noop"
desc = "(unbound)"

# Jump to the git repo root of the current view. Stays put if not in a repo.
[[mgr.prepend_keymap]]
on   = [ "g", "r" ]
run  = '''shell -- 'root=$(git rev-parse --show-toplevel 2>/dev/null); [ -n "$root" ] && ya emit cd "$root"' '''
desc = "Jump to git repo root"

# smart-enter: open files OR enter directories with one key.
[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter directory, or open file"

# smart-paste: paste into the hovered directory if hovering one, else CWD.
[[mgr.prepend_keymap]]
on   = "p"
run  = "plugin smart-paste"
desc = "Paste into hovered dir or CWD"

# Tabs: smart-tab creates a new tab pointing at the hovered directory;
# smart-switch creates the target tab on demand if it doesn't exist yet.
[[mgr.prepend_keymap]]
on   = [ "t", "t" ]
run  = "plugin smart-tab"
desc = "Create a tab in the hovered directory"

[[mgr.prepend_keymap]]
on   = "1"
run  = "plugin smart-switch 0"
desc = "Switch to or create tab 1"

[[mgr.prepend_keymap]]
on   = "2"
run  = "plugin smart-switch 1"
desc = "Switch to or create tab 2"

[[mgr.prepend_keymap]]
on   = "3"
run  = "plugin smart-switch 2"
desc = "Switch to or create tab 3"

[[mgr.prepend_keymap]]
on   = "4"
run  = "plugin smart-switch 3"
desc = "Switch to or create tab 4"

[[mgr.prepend_keymap]]
on   = "5"
run  = "plugin smart-switch 4"
desc = "Switch to or create tab 5"

[[mgr.prepend_keymap]]
on   = "6"
run  = "plugin smart-switch 5"
desc = "Switch to or create tab 6"

[[mgr.prepend_keymap]]
on   = "7"
run  = "plugin smart-switch 6"
desc = "Switch to or create tab 7"

[[mgr.prepend_keymap]]
on   = "8"
run  = "plugin smart-switch 7"
desc = "Switch to or create tab 8"

[[mgr.prepend_keymap]]
on   = "9"
run  = "plugin smart-switch 8"
desc = "Switch to or create tab 9"

# Chmod on selected files (canonical binding from the plugin's README).
[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"

# Diff the selected file against the hovered file (output is a unified
# patch copied to the clipboard).
[[mgr.prepend_keymap]]
on   = [ "c", "M" ]
run  = "plugin diff"
desc = "Diff selected against hovered"

# Preview pane controls.
[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane min-preview"
desc = "Show or hide the preview pane"

[[mgr.prepend_keymap]]
on   = "M"
run  = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"
