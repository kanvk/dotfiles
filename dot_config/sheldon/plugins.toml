# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

[templates]

defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
# Adds a plugin's `completions/` subdir (rather than its root) to fpath. Used
# by plugins like forgit that source a `*.plugin.zsh` from the root but ship
# `_<tool>` completions one level down.
fpath-completions = "fpath=(\"{{ dir }}/completions\" $fpath)"

[plugins]

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

# Fpath-only plugins MUST come before oh-my-zsh: OMZ runs compinit during its
# source, so anything that prepends to fpath after that point is invisible to
# the completion system. zsh-defer (above) is fpath-neutral and stays first
# because forgit's deferred source needs `zsh-defer` already defined.
[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
dir = "src"
apply = ["fpath"]

[plugins.forgit]
github = "wfxr/forgit"
use = ["forgit.plugin.zsh"]
apply = ["defer", "fpath-completions"]

[plugins.oh-my-zsh]
github = "ohmyzsh/ohmyzsh"

# OMZ plugins sourced lazily via zsh-defer. Each is a simple function or
# alias bundle that doesn't need to be in scope before the first prompt.
# The `dir` directives reference the OMZ clone shared with the oh-my-zsh
# entry above (sheldon de-dupes by github URL).

# extract: provides the `extract` function for long-tail formats (.deb, .rpm,
# .jar, .whl, .xpi, .ipa, .zpaq, .lrz, .sublime-package, …) that ouch doesn't
# handle. The plugin's last line is `alias x=extract`, which would clobber the
# `alias x='ouch d'` we set in alias.zsh — re-assert it via a deferred post-hook
# so it queues *after* the plugin's own source runs.
[plugins.omz-extract]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/extract"
use = ["extract.plugin.zsh"]
apply = ["defer"]
hooks = { post = "zsh-defer -c \"alias x='ouch d'\"" }

[plugins.omz-copypath]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/copypath"
use = ["copypath.plugin.zsh"]
apply = ["defer"]

[plugins.omz-copyfile]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/copyfile"
use = ["copyfile.plugin.zsh"]
apply = ["defer"]

[plugins.omz-history]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/history"
use = ["history.plugin.zsh"]
apply = ["defer"]

[plugins.omz-jsontools]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/jsontools"
use = ["jsontools.plugin.zsh"]
apply = ["defer"]

[plugins.omz-rsync]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/rsync"
use = ["rsync.plugin.zsh"]
apply = ["defer"]

[plugins.alias-tips]
github = "djui/alias-tips"
apply = ["defer"]

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["{{ name }}.zsh"]
apply = ["defer"]

[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"
apply = ["defer"]

[plugins.zsh-completion-generator]
github = "RobSis/zsh-completion-generator"
apply = ["defer"]

[plugins.zsh-ssh]
github = "kanvk/zsh-ssh"
apply = ["defer"]

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"
apply = ["defer"]

[plugins.zsh-vi-mode]
github = "jeffreytse/zsh-vi-mode"
apply = ["defer"]

[plugins.powerlevel10k]
github = "romkatv/powerlevel10k"
